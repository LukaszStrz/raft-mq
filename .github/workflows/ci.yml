name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Unit Tests
      run: dotnet test RaftMq.Tests.Unit/RaftMq.Tests.Unit.csproj --no-build --verbosity normal

    - name: Integration Tests
      run: dotnet test RaftMq.Tests.Integration/RaftMq.Tests.Integration.csproj --no-build --verbosity normal
