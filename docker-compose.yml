version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: raft-mq-broker
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
